{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h3><i class="bi bi-tags"></i> Справочник: Категории деталей</h3>
    <button class="btn btn-primary rounded-circle shadow" data-bs-toggle="modal" data-bs-target="#addModal" style="width: 50px; height: 50px; font-size: 24px; line-height: 1;">
        <i class="bi bi-plus"></i>
    </button>
</div>

<table class="table table-hover align-middle border">
    <thead class="table-light">
        <tr><th>ID категории</th><th>Название категории</th><th class="text-end">Действия</th></tr>
    </thead>
    <tbody>
        {% for row in data %}
        <tr>
            <td>{{ row.id_category }}</td>
            <td><strong>{{ row.name }}</strong></td>
            <td class="text-end">
                <a href="/delete_category/{{ row.id_category }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Удалить эту категорию?');">
                    <i class="bi bi-trash"></i>
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<!-- Модальное окно -->
<div class="modal fade" id="addModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form method="POST">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title">Добавить категорию деталей</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
                <label>Название категории</label>
                <input type="text" name="name" class="form-control" placeholder="Например: Процессоры, Видеокарты" required>
            </div>
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Сохранить</button>
          </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
