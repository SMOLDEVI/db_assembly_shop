{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-dark text-white text-center py-4">
                <h4 class="mb-0 fw-bold"><i class="bi bi-person-plus-fill me-2 text-info"></i>Регистрация нового аккаунта</h4>
                <p class="text-muted small mb-0 mt-1">ООО «ТехноПромСборка»</p>
            </div>
            <div class="card-body p-4 bg-light">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Имя пользователя (Логин)</label>
                        <div class="input-group shadow-sm">
                            <span class="input-group-text"><i class="bi bi-person-fill text-secondary"></i></span>
                            <input type="text" name="username" class="form-control" placeholder="Придумайте логин..." required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Пароль</label>
                        <div class="input-group shadow-sm">
                            <span class="input-group-text"><i class="bi bi-lock-fill text-secondary"></i></span>
                            <input type="password" name="password" class="form-control" placeholder="Придумайте пароль..." required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Тип учетной записи (Роль)</label>
                        <select name="role" class="form-select shadow-sm" required>
                            <option value="client" selected>Клиент цеха (Заказ готовой продукции)</option>
                            <option value="worker">Работник цеха (Полный доступ к учету)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 py-3 shadow-sm mb-3">
                        <i class="bi bi-person-plus-fill me-2"></i>Зарегистрироваться
                    </button>
                </form>

                <div class="text-center mt-2">
                    <span class="text-muted">Уже есть аккаунт?</span> 
                    <a href="/login" class="fw-bold text-decoration-none">Войти в систему</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
