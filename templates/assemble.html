{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-warning text-dark border-0">
                <h4 class="mb-0"><i class="bi bi-tools"></i> Автоматическая сборка</h4>
            </div>
            <div class="card-body bg-light">
                <p class="text-muted small">Выберите изделие. Система сама проверит спецификацию, спишет нужные детали со склада и положит готовое изделие в указанную ячейку.</p>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Что собираем?</label>
                        <select name="product_type_id" class="form-select" required>
                            {% for p in products %}
                                <option value="{{ p.id_product_type }}">{{ p.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Количество к сборке</label>
                        <input type="number" name="quantity" class="form-control" value="1" min="1" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">В какую ячейку положить (склад изделий)?</label>
                        <input type="text" name="cell_number" class="form-control" placeholder="Например: И-01" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100"><i class="bi bi-play-fill"></i> Начать сборку</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
