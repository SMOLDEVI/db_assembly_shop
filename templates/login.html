{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-dark text-white text-center py-4">
                <h4 class="mb-0 fw-bold"><i class="bi bi-box-arrow-in-right me-2 text-info"></i>Вход в систему</h4>
                <p class="text-muted small mb-0 mt-1">ООО «ТехноПромСборка»</p>
            </div>
            <div class="card-body p-4 bg-light">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Имя пользователя (Логин)</label>
                        <div class="input-group shadow-sm">
                            <span class="input-group-text"><i class="bi bi-person-fill text-secondary"></i></span>
                            <input type="text" name="username" class="form-control" placeholder="Введите логин..." required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Пароль</label>
                        <div class="input-group shadow-sm">
                            <span class="input-group-text"><i class="bi bi-lock-fill text-secondary"></i></span>
                            <input type="password" name="password" class="form-control" placeholder="Введите пароль..." required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 py-3 shadow-sm mb-3">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Войти
                    </button>
                </form>

                <div class="bg-white p-3 rounded-3 border mb-3">
                    <div class="fw-bold mb-1 small text-secondary">Демо-пользователи:</div>
                    <div class="small text-muted"><i class="bi bi-person-badge"></i> Работник: <code>admin</code> / <code>admin</code></div>
                    <div class="small text-muted"><i class="bi bi-person"></i> Клиент: <code>client</code> / <code>client</code></div>
                </div>

                <div class="text-center mt-2">
                    <span class="text-muted">Нет учетной записи?</span> 
                    <a href="/register" class="fw-bold text-decoration-none">Зарегистрироваться</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
