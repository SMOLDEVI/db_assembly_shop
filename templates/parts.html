{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h3><i class="bi bi-nut"></i> Справочник: Детали</h3>
    <!-- Кнопка ПЛЮС в углу -->
    <button class="btn btn-primary rounded-circle shadow" data-bs-toggle="modal" data-bs-target="#addModal" style="width: 50px; height: 50px; font-size: 24px; line-height: 1;">
        <i class="bi bi-plus"></i>
    </button>
</div>

<table class="table table-hover align-middle border">
    <thead class="table-light">
        <tr><th>ID</th><th>Название</th><th>Артикул</th><th>Категория</th><th class="text-end">Действия</th></tr>
    </thead>
    <tbody>
        {% for row in data %}
        <tr>
            <td>{{ row.id_part }}</td>
            <td><strong>{{ row.name }}</strong></td>
            <td><span class="badge bg-secondary">{{ row.article }}</span></td>
            <td>{{ row.category_name if row.category_name else '—' }}</td>
            <td class="text-end">
                <!-- Иконка КОРЗИНЫ -->
                <a href="/delete_part/{{ row.id_part }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Удалить?');">
                    <i class="bi bi-trash"></i>
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<!-- Модальное окно (всплывающая форма добавления) -->
<div class="modal fade" id="addModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form method="POST">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title">Добавить новую деталь</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
                <label>Название</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Артикул</label>
                <input type="text" name="article" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Категория</label>
                <select name="category_id" class="form-select">
                    <option value="">-- Без категории --</option>
                    {% for cat in categories %}
                    <option value="{{ cat.id_category }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Сохранить</button>
          </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
